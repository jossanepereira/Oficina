<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Oficinas de Co-Design</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔥 Open Graph (WhatsApp, Facebook, etc) -->
  <meta property="og:title" content="Participe das Oficinas de Co-Design">
  <meta property="og:description" content="Ajude a transformar o cuidado obstétrico para imigrantes. Inscreva-se agora!">
  <meta property="og:image" content="https://SEU-LINK.netlify.app/sua-imagem.jpg">
  <meta property="og:url" content="https://SEU-LINK.netlify.app">
  <meta property="og:type" content="website">

  <!-- Twitter (ajuda em outras plataformas também) -->
  <meta name="twitter:card" content="summary_large_image">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 15px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease-in-out;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      color: #4a148c;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      background: #6a11cb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border-radius: 50px;
      text-decoration: none;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      animation: pulse 1.5s infinite;
    }

    .btn:hover {
      background: #2575fc;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="sua-imagem.jpg" alt="Oficinas de Co-Design">

    <h1>Participe das Oficinas de Co-Design</h1>
    <p>Vagas limitadas — garanta sua participação agora.</p>

    <a href="https://docs.google.com/forms/d/1KgnOEv2QYDrgCI7HcC1-3mjs0UXAcuMffsDuBq2QYmY/edit" target="_blank" class="btn">
      Fazer Inscrição
    </a>
  </div>

</body>
</html>
